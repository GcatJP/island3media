<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Adventure Island 3</title>

    <!-- Inter font (Latin). Japanese glyphs fall back automatically to the device's
     native CJK font (Hiragino Sans on iOS/Mac, Noto Sans CJK on Android, etc.) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        width: 100%;
        background: linear-gradient(180deg, #f4b23e 0%, #e47d31 60%);
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Hiragino Sans",
          "Hiragino Kaku Gothic ProN",
          sans-serif;
      }

      #container {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #f4b23e 0%, #e47d31 60%);
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      /* Wrapper shrinks to the exact rendered size of the image so the
     button % positions always line up with the same spot on the image,
     no matter the screen size. */
      #imageWrap {
        position: relative;
        display: inline-block;
        max-width: 100%;
        max-height: 100%;
      }

      #bgImage {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        max-height: 100dvh;
        width: auto;
        height: auto;
      }

      .urlBtn {
        position: absolute;
        background-color: #d4631e; /* dark blue */
        color: #ffffff;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        border-radius: 14px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        touch-action: manipulation;
        line-height: 1.25;
        border: 2px solid #ff0000; /* red border */
      }

      /* ============ PHONE — PORTRAIT (default) ============ */
      body.phone-device.portrait-mode .btn-videos {
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        bottom: 75%;
        height: 25%;
        font-size: 6.2vw;
        padding: 0 4%;
      }
      body.phone-device.portrait-mode .btn-games {
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        bottom: 46%;
        height: 25%;
        font-size: 6vw;
        padding: 0 4%;
      }

      /* ============ PHONE — LANDSCAPE ============ */
      body.phone-device.landscape-mode .btn-videos {
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        top: 5%;
        height: 15%;
        font-size: 1.8vw;
        padding: 0 2%;
      }
      body.phone-device.landscape-mode .btn-games {
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        top: 22%;
        height: 15%;
        font-size: 1.7vw;
        padding: 0 2%;
      }

      /* ============ TABLET — PORTRAIT ============ */
      body.tablet-device.portrait-mode .btn-videos {
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        bottom: 70%;
        height: 23%;
        font-size: 5.6vw;
        padding: 0 4%;
      }
      body.tablet-device.portrait-mode .btn-games {
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        bottom: 44%;
        height: 23%;
        font-size: 5vw;
        padding: 0 4%;
      }

      /* ============ TABLET — LANDSCAPE ============ */
      body.tablet-device.landscape-mode .btn-videos {
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        top: 5%;
        height: 13%;
        font-size: 3.1vw;
        padding: 0 2%;
      }
      body.tablet-device.landscape-mode .btn-games {
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        top: 22%;
        height: 13%;
        font-size: 3.1vw;
        padding: 0 2%;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="imageWrap">
        <img id="bgImage" src="" alt="Adventure Island 3" />

        <a
          class="urlBtn btn-videos"
          href="https://3videos.adventureislandesl.com"
        >
          🏔️Adventure Island 3 動画こちらをクリック🏔️
        </a>

        <a
          class="urlBtn btn-games"
          href="https://3games.adventureislandesl.com"
        >
          🏔️Adventure Island 3 ゲームこちらをクリック🏔️
        </a>
      </div>
    </div>

    <script>
      (function () {
        var img = document.getElementById("bgImage");
        var body = document.body;

        // Determine phone vs tablet ONCE, using the shorter physical
        // screen edge — this stays constant across rotation, unlike
        // window.innerWidth/innerHeight which swap with orientation.
        var shortEdge = Math.min(window.screen.width, window.screen.height);
        if (shortEdge >= 768) {
          body.classList.add("tablet-device");
        } else {
          body.classList.add("phone-device");
        }

        function updateLayout() {
          var isPortrait = window.innerHeight >= window.innerWidth;
          if (isPortrait) {
            if (img.getAttribute("src") !== "portrait.png")
              img.src = "portrait.png";
            body.classList.add("portrait-mode");
            body.classList.remove("landscape-mode");
          } else {
            if (img.getAttribute("src") !== "landscape.png")
              img.src = "landscape.png";
            body.classList.add("landscape-mode");
            body.classList.remove("portrait-mode");
          }
        }

        updateLayout();
        window.addEventListener("resize", updateLayout);
        window.addEventListener("orientationchange", updateLayout);
      })();
    </script>
  </body>
</html>
